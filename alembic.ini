[alembic]
script_location = alembic
prepend_sys_path = .
timezone = UTC
version_path_separator = os

# sqlalchemy.url is intentionally left blank here — env.py reads the
# real URL from aether.config.settings.database_url (single source of
# truth: coding convention #9, "all config via settings object").
sqlalchemy.url =

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARNING
handlers = console
qualname =

[logger_sqlalchemy]
level = WARNING
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
